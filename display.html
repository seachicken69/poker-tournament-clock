<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>錦標賽儀錶板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Noto+Serif+TC:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg-0:#060b07;
  --bg-1:#0a1810;
  --felt:#0c2417;
  --felt-line:#1d4430;
  --gold:#d4af37;
  --gold-hi:#f3df9f;
  --gold-dim:#7d6326;
  --cream:#f4ecd8;
  --ink:#9fc2ac;
  --amber:#e3a23d;
  --red:#d4283f;
  --red-glow:rgba(212,40,63,.55);
  --amber-glow:rgba(227,162,61,.45);
  --gold-glow:rgba(212,175,55,.35);
  --serif:'Cinzel','Noto Serif TC',serif;
  --mono:'IBM Plex Mono','Noto Sans TC',monospace;
  --digit:'DSEG7 Classic',var(--mono);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg-0);color:var(--cream);
  font-family:var(--mono);
  min-height:100vh;display:flex;flex-direction:column;
  overflow:hidden;user-select:none;position:relative;
}

/* ── Atmosphere ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 90% 60% at 50% -10%, rgba(212,175,55,.08), transparent 60%),
    radial-gradient(ellipse 80% 70% at 50% 110%, rgba(12,36,23,.9), transparent 60%),
    repeating-linear-gradient(135deg, rgba(212,175,55,.018) 0 2px, transparent 2px 26px),
    repeating-linear-gradient(45deg, rgba(212,175,55,.018) 0 2px, transparent 2px 26px),
    radial-gradient(circle at 50% 50%, var(--bg-1) 0%, var(--bg-0) 78%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  box-shadow:inset 0 0 22vw rgba(0,0,0,.85);
}
.suit{
  position:fixed;z-index:0;pointer-events:none;
  font-family:Georgia,serif;color:var(--gold);opacity:.045;
  font-size:26vw;line-height:1;filter:blur(.5px);
}
.suit.tl{top:-9vw;left:-7vw;transform:rotate(-12deg)}
.suit.br{bottom:-9vw;right:-7vw;transform:rotate(168deg)}

/* ── Marquee header ── */
.header{
  position:relative;z-index:1;padding:16px 28px 14px;text-align:center;
  border-bottom:1px solid var(--gold-dim);
  background:linear-gradient(180deg, rgba(212,175,55,.07), transparent);
}
.header::before,.header::after{
  content:'';position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
}
.header::before{bottom:-3px}
.header-row{display:flex;align-items:center;justify-content:center;gap:18px}
.diamond{color:var(--gold);font-size:clamp(10px,1vw,14px);opacity:.8;flex-shrink:0}
.t-name{
  font-family:var(--serif);font-weight:900;
  font-size:clamp(20px,2.6vw,34px);
  letter-spacing:.18em;text-transform:uppercase;
  background:linear-gradient(100deg, var(--gold-dim) 0%, var(--gold-hi) 30%, var(--gold) 50%, var(--gold-hi) 70%, var(--gold-dim) 100%);
  background-size:240% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shimmer 7s linear infinite;
}
@keyframes shimmer{0%{background-position:0% 0}100%{background-position:240% 0}}
.subtitle{margin-top:5px;font-size:clamp(9px,.8vw,11px);letter-spacing:.4em;color:var(--ink);text-transform:uppercase}

/* ── Main 3-column grid ── */
.main{
  position:relative;z-index:1;
  flex:1;display:grid;
  grid-template-columns:1fr 1.7fr 1fr;
  gap:18px;padding:20px 26px;min-height:0;
}

/* ── Plaques (info boxes) ── */
.col-side{display:flex;flex-direction:column;gap:14px;justify-content:center}
.plaque{
  position:relative;
  background:linear-gradient(160deg, var(--felt), #081711);
  border:1px solid var(--felt-line);
  border-radius:6px;padding:14px 16px;text-align:center;
  box-shadow:0 6px 18px rgba(0,0,0,.45), inset 0 0 0 1px rgba(212,175,55,.05);
}
.plaque::before{
  content:'';position:absolute;inset:4px;border:1px solid rgba(212,175,55,.16);
  border-radius:3px;pointer-events:none;
}
.plaque-label{
  font-size:clamp(9px,.78vw,11px);color:var(--gold);
  text-transform:uppercase;letter-spacing:.22em;margin-bottom:7px;font-weight:600;
}
.plaque-value{
  font-family:var(--digit);font-size:clamp(22px,2.6vw,36px);
  color:var(--cream);letter-spacing:.02em;
  text-shadow:0 0 18px rgba(244,236,216,.18);
}
.plaque-sub{font-size:12px;color:var(--ink);margin-top:4px;font-family:var(--mono)}

/* ── Center stage ── */
.col-center{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
}
.ribbon{
  position:relative;
  font-family:var(--serif);font-weight:700;
  font-size:clamp(15px,1.6vw,22px);
  color:var(--bg-0);background:linear-gradient(180deg,var(--gold-hi),var(--gold));
  padding:7px 36px;letter-spacing:.32em;text-transform:uppercase;
  clip-path:polygon(14px 0,100% 0,calc(100% - 14px) 100%,0 100%);
  box-shadow:0 4px 14px rgba(0,0,0,.5);
}
.stage{position:relative;display:flex;align-items:center;justify-content:center;margin:6px 0}
.stage::before{
  content:'';position:absolute;width:min(56vh,72vw);height:min(56vh,72vw);
  border-radius:50%;
  background:radial-gradient(circle, var(--gold-glow), transparent 68%);
  filter:blur(6px);animation:breathe 4s ease-in-out infinite;
  z-index:-1;
}
@keyframes breathe{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.9;transform:scale(1.05)}}
.timer{
  font-family:var(--digit);
  font-size:clamp(80px,13vw,168px);font-weight:400;line-height:1;
  color:var(--cream);text-shadow:0 0 50px rgba(244,236,216,.3), 0 0 100px rgba(212,175,55,.15);
  transition:color .3s, text-shadow .3s;
  letter-spacing:.01em;
}
.timer.warning{color:var(--amber);text-shadow:0 0 50px var(--amber-glow), 0 0 100px rgba(227,162,61,.2)}
.timer.danger{color:var(--red);text-shadow:0 0 50px var(--red-glow), 0 0 100px rgba(212,40,63,.25);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

.status-badge{
  position:relative;
  font-size:clamp(11px,1.1vw,14px);font-weight:600;font-family:var(--mono);
  padding:7px 26px;border-radius:30px;text-transform:uppercase;letter-spacing:.28em;
  background:rgba(0,0,0,.3);
}
.s-idle    {color:var(--ink);   box-shadow:inset 0 0 0 1px rgba(159,194,172,.35)}
.s-running {color:#7de8a8;      box-shadow:inset 0 0 0 1px rgba(125,232,168,.5), 0 0 16px rgba(125,232,168,.15)}
.s-paused  {color:var(--amber); box-shadow:inset 0 0 0 1px rgba(227,162,61,.55), 0 0 16px rgba(227,162,61,.15)}
.s-break   {color:#8fb4ff;      box-shadow:inset 0 0 0 1px rgba(143,180,255,.5), 0 0 16px rgba(143,180,255,.15)}
.s-finished{color:var(--ink);   box-shadow:inset 0 0 0 1px rgba(159,194,172,.35)}

.rebuy-info{font-size:clamp(11px,1.05vw,13px);color:var(--ink);text-align:center;letter-spacing:.04em}
.next-preview{font-size:clamp(10px,.95vw,12px);color:var(--gold-dim);margin-top:2px;letter-spacing:.08em;text-transform:uppercase}

/* ── Blinds rail ── */
.blinds-bar{
  position:relative;z-index:1;
  background:linear-gradient(180deg, rgba(212,175,55,.05), transparent);
  border-top:1px solid var(--gold-dim);
  display:grid;grid-template-columns:1fr 1fr 1fr;
  padding:4px 0 2px;
}
.blind-cell{position:relative;padding:14px 10px 16px;text-align:center}
.blind-cell + .blind-cell::before{
  content:'♦';position:absolute;left:0;top:50%;transform:translate(-50%,-50%);
  color:var(--gold);font-size:13px;opacity:.7;
}
.blind-label{
  font-size:clamp(9px,.78vw,11px);color:var(--gold);text-transform:uppercase;
  letter-spacing:.3em;margin-bottom:7px;font-weight:600;
}
.blind-value{
  font-family:var(--digit);font-size:clamp(30px,4.6vw,58px);
  color:var(--cream);text-shadow:0 0 22px rgba(244,236,216,.16);
}
</style>
</head>
<body>

<div class="suit tl">♠</div>
<div class="suit br">♥</div>

<div class="header">
  <div class="header-row">
    <span class="diamond">◆</span>
    <div class="t-name" id="t-name">AK 錦標賽</div>
    <span class="diamond">◆</span>
  </div>
  <div class="subtitle">Tournament Clock</div>
</div>

<div class="main">
  <!-- Left -->
  <div class="col-side">
    <div class="plaque">
      <div class="plaque-label">現在時間</div>
      <div class="plaque-value" id="current-time">--:--</div>
    </div>
    <div class="plaque">
      <div class="plaque-label">已進行</div>
      <div class="plaque-value" id="elapsed-time">00:00:00</div>
    </div>
    <div class="plaque">
      <div class="plaque-label">下次休息</div>
      <div class="plaque-value" id="next-break">--</div>
    </div>
  </div>

  <!-- Center -->
  <div class="col-center">
    <div class="ribbon" id="level-label">LEVEL 1</div>
    <div class="stage">
      <div class="timer" id="timer">--:--</div>
    </div>
    <div class="status-badge s-idle" id="status-badge">等待開始</div>
    <div class="rebuy-info" id="rebuy-info"></div>
    <div class="next-preview" id="next-preview"></div>
  </div>

  <!-- Right -->
  <div class="col-side">
    <div class="plaque">
      <div class="plaque-label">剩餘人數</div>
      <div class="plaque-value" id="players-rem">-</div>
      <div class="plaque-sub" id="total-players"></div>
    </div>
    <div class="plaque">
      <div class="plaque-label">平均籌碼</div>
      <div class="plaque-value" id="avg-chips">-</div>
    </div>
    <div class="plaque">
      <div class="plaque-label">獎池</div>
      <div class="plaque-value" id="prize-pool">$0</div>
    </div>
  </div>
</div>

<div class="blinds-bar">
  <div class="blind-cell">
    <div class="blind-label">Small Blind 小盲</div>
    <div class="blind-value" id="sb">-</div>
  </div>
  <div class="blind-cell">
    <div class="blind-label">Big Blind 大盲</div>
    <div class="blind-value" id="bb">-</div>
  </div>
  <div class="blind-cell">
    <div class="blind-label">Ante 前注</div>
    <div class="blind-value" id="ante">0</div>
  </div>
</div>

<script>
const SB_URL  = 'https://nezsuytdkonbvonzmdlj.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lenN1eXRka29uYnZvbnptZGxqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjY2MDYsImV4cCI6MjA5MTcwMjYwNn0.upQMNjJoS20cEi41aWDKJjTko7Y7aBfaMjHvdiMvZJA';
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_ANON);

let T = null;   // tournament
let BL = [];    // blind_levels

// ── Load ──────────────────────────────────────────────
async function load() {
  const { data: t } = await sb.from('tournaments').select('*')
    .eq('is_active', true).maybeSingle();
  if (!t) return;
  T = t;
  const { data: bl } = await sb.from('blind_levels').select('*')
    .eq('tournament_id', t.id).order('level_order');
  BL = bl || [];
  render();
}

function subscribe() {
  sb.channel('display-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tournaments' }, load)
    .subscribe();
}

// ── Helpers ───────────────────────────────────────────
function curLevel()  { return BL.find(l => l.level_order === T.current_level) }
function nextLevel() { return BL.find(l => l.level_order === T.current_level + 1) }

function remainingSecs() {
  if (!T || !curLevel()) return 0;
  if (T.status === 'paused') return T.pause_remaining_secs || 0;
  if (T.status === 'running' || T.status === 'break') {
    const elapsed = (Date.now() - new Date(T.level_start_at).getTime()) / 1000;
    return Math.max(0, curLevel().duration_minutes * 60 - elapsed);
  }
  return curLevel().duration_minutes * 60;
}

function elapsedTotalSecs() {
  if (!T) return 0;
  let done = 0;
  for (const l of BL) {
    if (l.level_order < T.current_level) done += l.duration_minutes * 60;
  }
  const cl = curLevel();
  if (!cl) return done;
  const levelTotal = cl.duration_minutes * 60;
  if (T.status === 'running' || T.status === 'break') {
    const cur = (Date.now() - new Date(T.level_start_at).getTime()) / 1000;
    return done + Math.min(cur, levelTotal);
  }
  if (T.status === 'paused') return done + levelTotal - (T.pause_remaining_secs || 0);
  return done;
}

function nextBreakSecs() {
  const nb = BL.find(l => l.level_order > T.current_level && l.is_break);
  if (!nb) return null;
  let secs = remainingSecs();
  for (const l of BL) {
    if (l.level_order > T.current_level && l.level_order < nb.level_order)
      secs += l.duration_minutes * 60;
  }
  return secs;
}

function fmt(s)    { s=Math.max(0,Math.floor(s)); return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}` }
function fmtH(s)   { s=Math.max(0,Math.floor(s)); const h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=s%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}` }
function num(n)    { return (n||0).toLocaleString() }

// ── Render ────────────────────────────────────────────
function render() {
  if (!T) return;
  document.getElementById('t-name').textContent = T.name;
  document.getElementById('players-rem').textContent = T.players_remaining || '-';
  document.getElementById('total-players').textContent = T.total_buy_ins ? `/ ${T.total_buy_ins}` : '';
  const gross    = (T.total_buy_ins || 0) * (T.buy_in_amount || 0);
  const rate     = (T.reserve_rate  || 0) / 100;
  const netPrize = Math.floor(gross * (1 - rate));
  document.getElementById('prize-pool').textContent = `$${num(netPrize)}`;
  document.getElementById('rebuy-info').textContent = T.rebuy_info || '';

  // Avg chips
  const avgEl = document.getElementById('avg-chips');
  if (T.total_buy_ins && T.starting_chips && T.players_remaining) {
    avgEl.textContent = num(Math.floor(T.total_buy_ins * T.starting_chips / T.players_remaining));
  } else {
    avgEl.textContent = '-';
  }

  // Status badge
  const badge = document.getElementById('status-badge');
  const sm = { idle:'等待開始',running:'進行中',paused:'暫停中',break:'休息中',finished:'已結束' };
  const sc = { idle:'s-idle',running:'s-running',paused:'s-paused',break:'s-break',finished:'s-finished' };
  badge.textContent = sm[T.status] || '-';
  badge.className = `status-badge ${sc[T.status] || 's-idle'}`;

  const cl = curLevel();
  const nl = nextLevel();

  if (cl) {
    if (cl.is_break) {
      document.getElementById('level-label').textContent = '☕ 休息時間';
      document.getElementById('sb').textContent = '-';
      document.getElementById('bb').textContent = '-';
      document.getElementById('ante').textContent = '-';
    } else {
      document.getElementById('level-label').textContent = `LEVEL ${cl.level_number || T.current_level}`;
      document.getElementById('sb').textContent = num(cl.small_blind);
      document.getElementById('bb').textContent = num(cl.big_blind);
      document.getElementById('ante').textContent = num(cl.ante);
    }
    if (nl) {
      document.getElementById('next-preview').textContent = nl.is_break
        ? '下一個：☕ 休息'
        : `下一級：SB ${num(nl.small_blind)} / BB ${num(nl.big_blind)}${nl.ante ? ` / Ante ${num(nl.ante)}` : ''}`;
    } else {
      document.getElementById('next-preview').textContent = '最後一級';
    }
  }
  tick();
}

function tick() {
  if (!T) return;
  const rem = remainingSecs();
  const timerEl = document.getElementById('timer');
  timerEl.textContent = fmt(rem);
  timerEl.className = 'timer' + (rem <= 30 ? ' danger' : rem <= 60 ? ' warning' : '');

  // Clock
  const now = new Date();
  document.getElementById('current-time').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // Elapsed
  document.getElementById('elapsed-time').textContent = fmtH(elapsedTotalSecs());

  // Next break
  const nb = nextBreakSecs();
  document.getElementById('next-break').textContent = nb !== null ? fmtH(nb) : '--';
}

// ── Wake Lock（防止螢幕自動關閉）────────────────────
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch(e) {}
  }
}
// 頁面重新顯示時（從背景切回）重新取得鎖定
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
// 首次需使用者互動才能觸發（iOS 限制），點擊任何地方後啟動
document.addEventListener('click', requestWakeLock, { once: true });
document.addEventListener('touchstart', requestWakeLock, { once: true });

// ── Init ─────────────────────────────────────────────
load();
subscribe();
setInterval(tick, 1000);
setInterval(load, 3000); // polling fallback if Realtime is not enabled
</script>
</body>
</html>
